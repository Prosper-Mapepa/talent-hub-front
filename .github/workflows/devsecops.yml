name: DevSecOps

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

env:
  TRIVY_SEVERITY: HIGH,CRITICAL
  TRIVY_SKIP_DIRS: node_modules,.next,out,dist

jobs:
  secret-scan:
    name: Secret Detection (TruffleHog)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          extra_args: --only-verified

  sast:
    name: SAST (Trivy FS)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate SARIF report
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '0'
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          format: sarif
          output: trivy-fs.sarif

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-fs.sarif') != ''
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-filesystem

      - name: Fail on HIGH/CRITICAL vulnerabilities
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          exit-code: '1'
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          format: table

  sbom:
    name: SBOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: spdx-json
          skip-dirs: ${{ env.TRIVY_SKIP_DIRS }}
          output: sbom.spdx.json

      - uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.spdx.json
          retention-days: 30

  docker:
    name: Docker Build & Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          load: true
          tags: veritalent-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001

      - name: Generate container SARIF
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: veritalent-web:ci
          scanners: vuln
          severity: ${{ env.TRIVY_SEVERITY }}
          ignore-unfixed: true
          trivy-args: --vuln-type library
          exit-code: '0'
          format: sarif
          output: trivy-image.sarif

      - name: Upload container SARIF
        uses: github/codeql-action/upload-sarif@v4
        if: always() && hashFiles('trivy-image.sarif') != ''
        with:
          sarif_file: trivy-image.sarif
          category: trivy-container

  gate:
    name: Security Gate
    runs-on: ubuntu-latest
    needs: [secret-scan, sast, sbom, docker]
    if: always()
    steps:
      - name: Passed
        if: ${{ !contains(needs.*.result, 'failure') && !contains(needs.*.result, 'cancelled') }}
        run: echo "DevSecOps passed."

      - name: Failed
        if: ${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}
        run: exit 1
